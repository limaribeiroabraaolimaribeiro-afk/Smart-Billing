name: Deploy Supabase Edge Functions

# Publica automaticamente todas as Edge Functions do Smart Billing
# (supabase/functions/*) sempre que houver push na main, ou sob demanda
# pelo botao "Run workflow" (workflow_dispatch).
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Instalar Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy de todas as functions em supabase/functions
        # Sem informar um nome, a CLI publica todas as functions do
        # diretorio (a pasta "_shared" e ignorada automaticamente por
        # comecar com "_", conforme convencao da propria CLI).
        run: supabase functions deploy --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
