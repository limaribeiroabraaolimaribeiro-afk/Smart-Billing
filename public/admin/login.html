<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Billing - Login</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="brand">
        <div class="brand-mark">SB</div>
        <div class="brand-name">Smart Billing</div>
      </div>
      <h1>Acesso do administrador</h1>
      <p class="subtitle">Entre com suas credenciais para gerenciar clientes e cobrancas.</p>

      <div id="loginError" class="form-error hidden"></div>

      <form id="loginForm">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="admin@smartbilling.com" required />
        </div>
        <div class="field">
          <label for="password">Senha</label>
          <input type="password" id="password" name="password" placeholder="********" required />
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="loginBtn">Entrar</button>
      </form>
    </div>
  </div>

  <script src="../js/config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/login.js"></script>
</body>
</html>
