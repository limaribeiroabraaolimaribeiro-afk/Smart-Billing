# Blueprint do Render (Infrastructure as Code) para o Smart Billing.
# Em https://dashboard.render.com voce pode criar o servico manualmente
# (New > Web Service) ou usar este arquivo com "New > Blueprint".
#
# As variaveis marcadas com "sync: false" devem ser preenchidas manualmente
# no painel do Render (Environment), nunca commitadas no repositorio.
services:
  - type: web
    name: smart-billing
    runtime: node
    plan: free
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 18.20.4
      # Nao defina PORT manualmente: o Render injeta essa variavel
      # automaticamente e o server.js ja usa process.env.PORT.
      - key: BASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: MERCADOPAGO_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PROVIDER_URL
        sync: false
      - key: WHATSAPP_PROVIDER_TOKEN
        sync: false
      - key: WHATSAPP_SENDER_NUMBER
        sync: false
      - key: ENABLE_BILLING_SCHEDULER
        value: true
      - key: BILLING_SCHEDULER_CRON
        value: 0 9 * * *
